name: CI

on:
  push:
    branches: ['**']

# Feature branch CI runs cancel superseded runs, and default branch CI runs are never cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

permissions:
  contents: read

jobs:
  go:
    uses: ./.github/workflows/_ci.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    secrets: inherit
