name: Release

# Reusable, fully open-source Go release primitive. Each platform builds on its
# own native runner, so a cgo consumer whose system libraries cannot be
# cross-compiled (libpcre2, sqlite, tree-sitter, and the like) still builds
# correctly; darwin binaries are signed and notarized with anchore/quill
# (Apache-2.0). All build, sign, archive, checksum, tag, and publish logic lives
# in the go-mk `release` command, driven one stage per job: tag computes a single
# shared tag, build runs per native runner, and publish collects every uploaded
# archive into one GitHub release. Build identity, version package, and
# entitlements come from the consumer's Makefile. Signing is skipped
# automatically when the signing secret is absent.

on:
  workflow_call:
    inputs:
      cgo:
        description: Build with CGO_ENABLED=1 on the native runners.
        required: false
        type: boolean
        default: false
      apt_packages:
        description: Space-separated apt packages to install on the Linux build runners.
        required: false
        type: string
      brew_packages:
        description: Space-separated Homebrew packages to install on the macOS build runners.
        required: false
        type: string
      submodules:
        description: Submodule checkout mode passed straight to actions/checkout.
        required: false
        type: string
        default: "false"
      quill_version:
        description: Pinned anchore/quill version to install for darwin signing.
        required: false
        type: string
        default: "v0.7.1"
      require_darwin_codesign:
        description: Fail darwin release builds when signing material is absent.
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - id: tag
        env:
          RELEASE_STAGE: tag
        run: make release

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - name: Install apt packages
        if: runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - name: Install brew packages
        if: runner.os == 'macOS' && inputs.brew_packages != ''
        run: brew install ${{ inputs.brew_packages }}
      - name: Install ccache on Linux
        if: runner.os == 'Linux' && inputs.cgo
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
      - name: Install ccache on macOS
        if: runner.os == 'macOS' && inputs.cgo
        run: brew install ccache
      - uses: actions/setup-go@v6
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Restore ccache
        id: ccache-restore
        if: inputs.cgo
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-
      - name: Configure ccache
        if: inputs.cgo
        run: |
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            if [ "${{ runner.os }}" = "macOS" ]; then
              echo "CC=ccache clang"
              echo "CXX=ccache clang++"
            else
              echo "CC=ccache gcc"
              echo "CXX=ccache g++"
            fi
          } >> "${GITHUB_ENV}"
      - name: Inspect go-mk cache manifest
        id: go-mk-cache-prep
        run: make go-mk-cache-manifest
      - name: Prepare generated submodules
        if: steps.go-mk-cache-prep.outputs.generated_cache_requires_submodules == 'true'
        run: git submodule update --init
      - name: Build go-mk cache manifest
        id: go-mk-cache
        if: steps.go-mk-cache-prep.outputs.generated_cache_enabled == 'true'
        run: make go-mk-cache-manifest
      - name: Restore generated outputs
        id: generated-cache-restore
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Restore quill
        id: quill-cache
        if: runner.os == 'macOS'
        uses: actions/cache/restore@v4
        with:
          path: ~/go/bin/quill
          key: quill-${{ runner.os }}-${{ runner.arch }}-${{ steps.setup-go.outputs.go-version }}-${{ inputs.quill_version }}
      - name: Add Go bin to PATH
        if: runner.os == 'macOS'
        run: echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Install quill
        if: runner.os == 'macOS' && steps.quill-cache.outputs.cache-hit != 'true'
        env:
          GOFLAGS: ""
        run: go install github.com/anchore/quill/cmd/quill@${{ inputs.quill_version }}
      - name: Build
        env:
          RELEASE_STAGE: build
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
          RELEASE_PLATFORMS: ${{ matrix.goos }}/${{ matrix.goarch }}
          CGO_ENABLED: ${{ inputs.cgo && '1' || '0' }}
          REQUIRE_DARWIN_CODESIGN: ${{ inputs.require_darwin_codesign && '1' || '' }}
          QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: make release
      - name: Show ccache stats
        if: inputs.cgo
        run: ccache --show-stats || true
      - name: Save generated outputs
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true' && steps.generated-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Save ccache
        if: inputs.cgo && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}
      - name: Save quill
        if: runner.os == 'macOS' && steps.quill-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/go/bin/quill
          key: quill-${{ runner.os }}-${{ runner.arch }}-${{ steps.setup-go.outputs.go-version }}-${{ inputs.quill_version }}
      - name: Attest archives
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Publish
        env:
          RELEASE_STAGE: publish
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: make release
      - name: Attest checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt
