name: Release

# Reusable, fully open-source Go release primitive. All orchestration lives in
# the go-mk binary `release` command (cross-compile with CGO disabled, sign and
# notarize darwin binaries with anchore/quill, tar.gz with sha256 checksums, tag
# push, GitHub release). This workflow only sets up the toolchain and runs
# `make release`; build identity, version package, platforms, and entitlements
# come from the consumer's Makefile. Signing is skipped automatically when the
# signing secret is absent.

on:
  workflow_call:
    inputs:
      quill_version:
        description: Pinned anchore/quill version to install.
        required: false
        type: string
        default: "v0.7.1"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      QUILL_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
      QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install quill
        env:
          GOFLAGS: ""
        run: go install github.com/anchore/quill/cmd/quill@${{ inputs.quill_version }}

      - name: Release
        run: make release
