name: Release

# Reusable, fully open-source Go release primitive. Every platform builds on an
# Ubuntu runner. The two linux targets build natively; the two darwin targets
# cross-compile inside the goreleaser-cross container (Apache-2.0 osxcross plus
# the macOS SDK) with the osxcross o64-clang/oa64-clang toolchain, so a cgo
# consumer still links its C dependencies for darwin. A cgo consumer provisions
# its external C libraries per target through GO_MK_CGO_DEPS. darwin binaries are
# signed and notarized with anchore/quill (Apache-2.0) from the Linux job. All
# build, sign, archive, checksum, tag, and publish logic lives in the go-mk
# `release` command, driven one stage per job: tag computes a single shared tag,
# build runs per target, and publish collects every uploaded archive into one
# GitHub release. Build identity, version package, and entitlements come from the
# consumer's Makefile. Signing is skipped automatically when the signing secret
# is absent.

on:
  workflow_call:
    inputs:
      cgo:
        description: Build with CGO_ENABLED=1.
        required: false
        type: boolean
        default: false
      apt_packages:
        description: Space-separated apt packages to install on the Linux build runners.
        required: false
        type: string
      submodules:
        description: Submodule checkout mode passed straight to actions/checkout.
        required: false
        type: string
        default: "false"
      quill_version:
        description: Pinned anchore/quill version to install for darwin signing.
        required: false
        type: string
        default: "v0.7.1"
      require_darwin_codesign:
        description: Fail darwin release builds when signing material is absent.
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - id: tag
        env:
          RELEASE_STAGE: tag
        run: make release

  # The build matrix lives in the shared component.
  # The @main reference keeps the nested workflow on the ref consumers already pin.
  build:
    name: Build
    needs: tag
    uses: agoodkind/go-makefile/.github/workflows/_release_build.yml@main
    secrets: inherit
    with:
      cgo: ${{ inputs.cgo }}
      apt_packages: ${{ inputs.apt_packages }}
      submodules: ${{ inputs.submodules }}
      quill_version: ${{ inputs.quill_version }}
      require_darwin_codesign: ${{ inputs.require_darwin_codesign }}
      release_tag: ${{ needs.tag.outputs.tag }}

  publish:
    name: Publish
    needs: [tag, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Publish
        env:
          RELEASE_STAGE: publish
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: make release
      - name: Attest checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt
