name: Release

# Reusable, fully open-source Go release primitive. The `platforms` input picks
# the os/arch targets (default all four). linux targets build natively on
# Ubuntu. darwin targets cross-compile on Ubuntu inside the goreleaser-cross
# container (Apache-2.0 osxcross plus the macOS SDK) by default, or build
# natively on the macOS runner named by the `darwin_runner` input when the
# repo's generated prerequisites need native macOS tools. A cgo consumer
# provisions its external C libraries per target through GO_MK_CGO_DEPS. darwin
# binaries are signed and notarized with anchore/quill (Apache-2.0). All build,
# sign, archive, checksum, tag, and publish logic lives in the go-mk `release`
# command, driven one stage per job: tag computes a single shared tag, compile
# builds each target, package signs and archives each target, and publish
# collects every uploaded archive into one GitHub release. Build identity,
# version package, and entitlements come from the consumer's Makefile. Signing
# is skipped automatically when the signing secret is absent.

on:
  workflow_call:
    inputs:
      cgo:
        description: Build with CGO_ENABLED=1.
        required: false
        type: boolean
        default: false
      apt_packages:
        description: Space-separated apt packages to install on the Linux build runners.
        required: false
        type: string
      submodules:
        description: Submodule checkout mode passed straight to actions/checkout.
        required: false
        type: string
        default: "false"
      quill_version:
        description: Pinned anchore/quill version to install for darwin signing.
        required: false
        type: string
        default: "v0.7.1"
      require_darwin_codesign:
        description: Fail darwin release builds when signing material is absent.
        required: false
        type: boolean
        default: false
      binary:
        description: Binary asset prefix to verify after publish.
        required: false
        type: string
        default: ""
      platforms:
        description: >-
          Space-separated os/arch targets to build, passed to the shared build
          component. Defaults to all four release platforms.
        required: false
        type: string
        default: "darwin/amd64 darwin/arm64 linux/amd64 linux/arm64"
      darwin_runner:
        description: >-
          macOS runner label for native darwin builds, passed to the shared
          build component. Empty keeps the Ubuntu cross-compile default.
        required: false
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

# Authenticate the go-mk bootstrap fetch (bootstrap.mk / go-mk-fetch-one.sh use
# gh api when a token is present) so it hits the 5000/hr contents API instead of
# the rate-limited raw.githubusercontent.com CDN, which throttles under the
# parallel job matrix and hard-fails the moratorium fetch.
env:
  GH_TOKEN: ${{ github.token }}

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - id: tag
        env:
          RELEASE_STAGE: tag
        run: make release

  # The compile matrix lives in the shared build component. It uploads the raw
  # per-platform binaries the package job consumes.
  # The @main reference keeps the nested workflow on the ref consumers already pin.
  compile:
    name: Compile
    needs: tag
    permissions:
      contents: read
    uses: agoodkind/go-makefile/.github/workflows/_build.yml@main
    secrets: inherit
    with:
      cgo: ${{ inputs.cgo }}
      apt_packages: ${{ inputs.apt_packages }}
      submodules: ${{ inputs.submodules }}
      release_tag: ${{ needs.tag.outputs.tag }}
      platforms: ${{ inputs.platforms }}
      darwin_runner: ${{ inputs.darwin_runner }}

  # The package matrix signs, notarizes, archives, and attests the compiled
  # binaries, uploading one release-<goos>-<goarch> archive per platform.
  package:
    name: Package
    needs: [tag, compile]
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: agoodkind/go-makefile/.github/workflows/_package.yml@main
    secrets: inherit
    with:
      submodules: ${{ inputs.submodules }}
      quill_version: ${{ inputs.quill_version }}
      require_darwin_codesign: ${{ inputs.require_darwin_codesign }}
      release_tag: ${{ needs.tag.outputs.tag }}
      platforms: ${{ inputs.platforms }}

  publish:
    name: Publish
    needs: [tag, package]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Publish
        env:
          RELEASE_STAGE: publish
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: make release
      - name: Attest checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt

  verify:
    name: Verify
    needs: [tag, publish]
    if: inputs.binary != ''
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GOPROXY: direct
      GOPRIVATE: goodkind.io/go-makefile
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: ${{ inputs.submodules }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Verify release assets
        env:
          RELEASE_BINARIES: ${{ inputs.binary }}
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: |
          for binary in ${RELEASE_BINARIES}; do
            attempt=1
            while [ "${attempt}" -le 5 ]; do
              if go run goodkind.io/go-makefile/selfupdate/cmd/verify-release@main --repo "${GITHUB_REPOSITORY}" --tag "${RELEASE_TAG}" --binary "${binary}"; then
                break
              fi
              if [ "${attempt}" -eq 5 ]; then
                exit 1
              fi
              sleep 30
              attempt=$((attempt + 1))
            done
          done
