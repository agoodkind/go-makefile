name: Package

# Shared package component. It consumes the per-platform build-<goos>-<goarch>
# artifacts the compile component uploaded, then signs and notarizes the darwin
# binaries with anchore/quill, writes one tar.gz per (binary, platform) pair,
# attests each archive, and uploads it as release-<goos>-<goarch>. It never
# compiles, tags, or publishes. Every leg runs on plain Ubuntu with no cross
# container, since quill signs Mach-O without macOS and archiving is host
# independent.

on:
  workflow_call:
    inputs:
      submodules:
        description: Submodule checkout mode passed straight to actions/checkout.
        required: false
        type: string
        default: "false"
      quill_version:
        description: Pinned anchore/quill version to install for darwin signing.
        required: false
        type: string
        default: "v0.7.1"
      require_darwin_codesign:
        description: Fail darwin packaging when signing material is absent.
        required: false
        type: boolean
        default: false
      release_tag:
        description: >-
          Tag threaded through every package job for consistent archive naming.
          An empty value lets each job derive its own stamp tag internally
          without touching git.
        required: false
        type: string
        default: ""
      platforms:
        description: >-
          Space-separated os/arch targets to package. Defaults to all four
          release platforms and must match the platforms the compile component
          built.
        required: false
        type: string
        default: "darwin/amd64 darwin/arm64 linux/amd64 linux/arm64"

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        env:
          PLATFORMS: ${{ inputs.platforms }}
        # Emit one matrix row per requested platform. Packaging never compiles,
        # so every leg runs on Ubuntu with no cross container regardless of the
        # target os/arch.
        run: |
          rows='[]'
          for platform in ${PLATFORMS}; do
            goos="${platform%%/*}"
            goarch="${platform##*/}"
            case "${goos}/${goarch}" in
              linux/amd64|linux/arm64|darwin/amd64|darwin/arm64)
                row=$(jq -nc --arg goos "${goos}" --arg goarch "${goarch}" '{goos:$goos,goarch:$goarch}')
                ;;
              *)
                echo "unsupported platform: ${platform}" >&2
                exit 1
                ;;
            esac
            rows=$(jq -c --argjson row "${row}" '. + [$row]' <<<"${rows}")
          done
          if [ "$(jq 'length' <<<"${rows}")" = "0" ]; then
            echo "platforms resolved to an empty matrix" >&2
            exit 1
          fi
          echo "matrix=$(jq -c '{include: .}' <<<"${rows}")" >> "${GITHUB_OUTPUT}"

  package:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      - uses: actions/setup-go@v6
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      # Restore the raw binaries the compile job produced for this platform back
      # into dist/<name>_<os>_<arch>/, which the package stage signs and archives.
      - name: Download compiled binaries
        uses: actions/download-artifact@v7
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist
      - name: Restore quill
        id: quill-cache
        if: matrix.goos == 'darwin'
        uses: actions/cache/restore@v6
        with:
          path: ~/go/bin/quill
          key: quill-${{ runner.os }}-${{ runner.arch }}-${{ steps.setup-go.outputs.go-version }}-${{ inputs.quill_version }}
      - name: Add Go bin to PATH
        if: matrix.goos == 'darwin'
        run: echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Install quill
        if: matrix.goos == 'darwin' && steps.quill-cache.outputs.cache-hit != 'true'
        env:
          GOFLAGS: ""
        run: go install github.com/anchore/quill/cmd/quill@${{ inputs.quill_version }}
      - name: Package
        env:
          RELEASE_STAGE: package
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_PLATFORMS: ${{ matrix.goos }}/${{ matrix.goarch }}
          REQUIRE_DARWIN_CODESIGN: ${{ inputs.require_darwin_codesign && '1' || '' }}
          QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: make release
      - name: Save quill
        if: matrix.goos == 'darwin' && steps.quill-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/go/bin/quill
          key: quill-${{ runner.os }}-${{ runner.arch }}-${{ steps.setup-go.outputs.go-version }}-${{ inputs.quill_version }}
      - name: Attest archives
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
