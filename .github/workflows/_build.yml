name: Build

# Shared compile component. It cross-compiles the platforms the `platforms`
# input names (default all four) and uploads each platform's raw binaries as a
# build-<goos>-<goarch> artifact. It never signs, notarizes, archives, tags, or
# publishes; the package component consumes these artifacts for that. darwin
# targets cross-compile on Ubuntu by default, or build natively on the macOS
# runner named by the `darwin_runner` input.

on:
  workflow_call:
    inputs:
      cgo:
        description: Build with CGO_ENABLED=1.
        required: false
        type: boolean
        default: false
      apt_packages:
        description: Space-separated apt packages to install on the Linux build runners.
        required: false
        type: string
        default: ""
      submodules:
        description: Submodule checkout mode passed straight to actions/checkout.
        required: false
        type: string
        default: "false"
      release_tag:
        description: >-
          Tag threaded through every compile job for consistent version
          stamping. An empty value lets each build derive its own stamp tag
          internally without touching git, which suits callers that never
          publish the archives.
        required: false
        type: string
        default: ""
      platforms:
        description: >-
          Space-separated os/arch targets to build. Defaults to all four
          release platforms. A macOS-only consumer restricts this to the two
          darwin targets.
        required: false
        type: string
        default: "darwin/amd64 darwin/arm64 linux/amd64 linux/arm64"
      darwin_runner:
        description: >-
          GitHub-hosted macOS runner label for the darwin targets. Empty keeps
          the default path: darwin cross-compiles on Ubuntu inside the
          goreleaser-cross container. Set (for example to macos-26) when the
          repo's generated prerequisites need native macOS tools such as
          xcrun, lipo, or swiftc; the darwin jobs then build natively with the
          runner's toolchain and no container.
        required: false
        type: string
        default: ""

# The go-mk bootstrap fetch (bootstrap.mk / go.mk) downloads a single codeload
# tarball, which spends no GITHUB_TOKEN core-REST budget, with a
# raw.githubusercontent.com per-file fallback. GH_TOKEN stays set for any gh CLI
# step but is no longer required by the fetch.
env:
  GH_TOKEN: ${{ github.token }}

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        env:
          PLATFORMS: ${{ inputs.platforms }}
          DARWIN_RUNNER: ${{ inputs.darwin_runner }}
        # Emit one matrix row per requested platform. linux rows run natively
        # per-arch. darwin rows either cross-compile in the goreleaser-cross
        # container (default) or run natively on the requested macOS runner;
        # only cross rows carry cc/cxx, which the cross-specific steps key on.
        run: |
          rows='[]'
          for platform in ${PLATFORMS}; do
            goos="${platform%%/*}"
            goarch="${platform##*/}"
            case "${goos}/${goarch}" in
              linux/amd64)
                row='{"goos":"linux","goarch":"amd64","runner":"ubuntu-24.04","container":"","cc":"","cxx":""}'
                ;;
              linux/arm64)
                row='{"goos":"linux","goarch":"arm64","runner":"ubuntu-24.04-arm","container":"","cc":"","cxx":""}'
                ;;
              darwin/amd64)
                if [ -n "${DARWIN_RUNNER}" ]; then
                  row=$(jq -nc --arg r "${DARWIN_RUNNER}" '{goos:"darwin",goarch:"amd64",runner:$r,container:"",cc:"",cxx:""}')
                else
                  row='{"goos":"darwin","goarch":"amd64","runner":"ubuntu-24.04","container":"ghcr.io/goreleaser/goreleaser-cross:v1.26.3","cc":"o64-clang","cxx":"o64-clang++"}'
                fi
                ;;
              darwin/arm64)
                if [ -n "${DARWIN_RUNNER}" ]; then
                  row=$(jq -nc --arg r "${DARWIN_RUNNER}" '{goos:"darwin",goarch:"arm64",runner:$r,container:"",cc:"",cxx:""}')
                else
                  row='{"goos":"darwin","goarch":"arm64","runner":"ubuntu-24.04","container":"ghcr.io/goreleaser/goreleaser-cross:v1.26.3","cc":"oa64-clang","cxx":"oa64-clang++"}'
                fi
                ;;
              *)
                echo "unsupported platform: ${platform}" >&2
                exit 1
                ;;
            esac
            rows=$(jq -c --argjson row "${row}" '. + [$row]' <<<"${rows}")
          done
          if [ "$(jq 'length' <<<"${rows}")" = "0" ]; then
            echo "platforms resolved to an empty matrix" >&2
            exit 1
          fi
          echo "matrix=$(jq -c '{include: .}' <<<"${rows}")" >> "${GITHUB_OUTPUT}"

  compile:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: ${{ inputs.submodules }}
      # Inside the darwin cross container the job runs as root while the checkout
      # is owned by the runner user, so git refuses later submodule and stamp
      # commands with "detected dubious ownership". Trust every workspace path so
      # the top repo and any nested submodules are usable. Host runners skip this.
      - name: Trust workspace for git in container
        if: matrix.container != ''
        run: git config --global --add safe.directory '*'
      - name: Install apt packages
        if: matrix.goos == 'linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - name: Install ccache on Linux
        if: matrix.goos == 'linux' && inputs.cgo
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
      - name: Ensure ccache in darwin cross container
        if: matrix.container != '' && inputs.cgo
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends ccache
          fi
          ccache --version
      - uses: actions/setup-go@v7
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            go.work
            go.work.sum
      - name: Restore ccache
        id: ccache-restore
        if: matrix.goos == 'linux' && inputs.cgo
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-
      - name: Restore darwin ccache
        id: darwin-ccache-restore
        if: matrix.cc != '' && inputs.cgo
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          # Keep this tag segment aligned if the goreleaser-cross image becomes parameterized.
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-goreleaser-cross-v1.26.3-${{ matrix.cc }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-goreleaser-cross-v1.26.3-${{ matrix.cc }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}-
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-goreleaser-cross-v1.26.3-${{ matrix.cc }}-
      - name: Configure ccache
        if: matrix.goos == 'linux' && inputs.cgo
        run: |
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            echo "CC=ccache gcc"
            echo "CXX=ccache g++"
          } >> "${GITHUB_ENV}"
      - name: Declare cgo build target
        if: inputs.cgo
        # Publish the per-job target tuple so a consumer's make-layer
        # go-mk-cgo-deps prerequisite sees a target os/arch that agrees with the
        # cross compiler below and provisions into the same per-target prefix
        # the go-mk release engine uses, instead of falling back to the host
        # tuple (a darwin cross job would otherwise localize Mach-O objects
        # with the linux toolchain).
        run: |
          {
            echo "GO_MK_TARGET_GOOS=${{ matrix.goos }}"
            echo "GO_MK_TARGET_GOARCH=${{ matrix.goarch }}"
          } >> "${GITHUB_ENV}"
      - name: Configure darwin cross compilers
        if: matrix.cc != '' && inputs.cgo
        # Pass the cross compiler under dedicated GO_MK_CC / GO_MK_CXX rather than
        # the global CC / CXX, so go-mk applies it only to the target build and
        # its cgo-dep provisioning. Host-tool builds in this job (the go-mk binary)
        # then compile with the container's host compiler.
        #
        # ccache interposes through masquerade symlinks named after the compilers,
        # prepended to PATH, rather than a two-word "ccache o64-clang" value:
        # consumer dep recipes may invoke "$CC" as a single word (agent-gate's
        # pcre2 script does), and a two-word CC fails there with exit 127. When
        # ccache runs under a compiler's name it finds the real compiler later
        # in PATH, so GO_MK_CC stays the plain compiler name.
        run: |
          mkdir -p "${HOME}/.ccache"
          wrapper_dir="${RUNNER_TEMP}/ccache-masquerade"
          mkdir -p "${wrapper_dir}"
          ccache_bin="$(command -v ccache)"
          ln -sf "${ccache_bin}" "${wrapper_dir}/${{ matrix.cc }}"
          ln -sf "${ccache_bin}" "${wrapper_dir}/${{ matrix.cxx }}"
          echo "${wrapper_dir}" >> "${GITHUB_PATH}"
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            echo "GO_MK_CC=${{ matrix.cc }}"
            echo "GO_MK_CXX=${{ matrix.cxx }}"
          } >> "${GITHUB_ENV}"
          CCACHE_DIR="${HOME}/.ccache" ccache --zero-stats
      - name: Inspect go-mk cache manifest
        id: go-mk-cache-prep
        run: make go-mk-cache-manifest
      - name: Prepare generated submodules
        if: steps.go-mk-cache-prep.outputs.generated_cache_requires_submodules == 'true'
        run: make go-mk-prepare-submodules
      - name: Build go-mk cache manifest
        id: go-mk-cache
        if: steps.go-mk-cache-prep.outputs.generated_cache_enabled == 'true' || inputs.cgo
        env:
          GO_MK_TARGET_GOOS: ${{ matrix.goos }}
          GO_MK_TARGET_GOARCH: ${{ matrix.goarch }}
          GO_MK_CGO_TOOLCHAIN_ID: ${{ matrix.container || format('{0}-{1}', runner.os, runner.arch) }}
        run: make go-mk-cache-manifest
      - name: Restore generated outputs
        id: generated-cache-restore
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Restore cgo deps
        id: cgo-cache-restore
        if: steps.go-mk-cache.outputs.cgo_cache_enabled == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.cgo_cache_paths }}
          key: go-mk-cgo-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.cgo_cache_key }}
      - name: Compile
        env:
          RELEASE_STAGE: compile
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_PLATFORMS: ${{ matrix.goos }}/${{ matrix.goarch }}
          CGO_ENABLED: ${{ inputs.cgo && '1' || '0' }}
          GO_MK_CGO_CACHE_KEY: ${{ steps.go-mk-cache.outputs.cgo_cache_key }}
          GO_MK_CGO_CACHE_HIT: ${{ steps.cgo-cache-restore.outputs.cache-hit }}
        run: make release
      - name: Show ccache stats
        if: inputs.cgo
        run: ccache --show-stats || true
      - name: Save generated outputs
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true' && steps.generated-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Save cgo deps
        if: steps.go-mk-cache.outputs.cgo_cache_enabled == 'true' && steps.cgo-cache-restore.outputs.cache-hit != 'true' && hashFiles(format('{0}/**', steps.go-mk-cache.outputs.cgo_cache_paths)) != ''
        uses: actions/cache/save@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.cgo_cache_paths }}
          key: go-mk-cgo-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.cgo_cache_key }}
      - name: Save ccache
        if: matrix.goos == 'linux' && inputs.cgo && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}
      - name: Save darwin ccache
        if: matrix.cc != '' && inputs.cgo && steps.darwin-ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-goreleaser-cross-v1.26.3-${{ matrix.cc }}-${{ hashFiles('go.mod', 'go.sum', 'go.work', 'go.work.sum') }}-${{ github.run_id }}-${{ github.run_attempt }}
      # Upload this platform's raw compiled binaries under dist/<name>_<os>_<arch>/.
      # The package job downloads them back into dist to sign and archive without
      # recompiling.
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist
          if-no-files-found: error
