name: CI

on:
  workflow_call:
    inputs:
      submodules:
        description: >-
          Submodule checkout mode passed straight to actions/checkout
          (false, true, or recursive). Defaults to false so consumers
          without submodules are unaffected.
        required: false
        type: string
        default: "false"
      apt_packages:
        description: >-
          Space-separated apt packages to install before the Go steps, for
          consumers that need system libraries (for example a CGO dependency
          such as libpcre2-dev). A consumer with no system dependencies omits
          this input and the install step does not run.
        required: false
        type: string
      go_tool_packages:
        description: >-
          Space-separated Go packages to install before make runs, for
          consumers that need generated-code tools such as buf.
        required: false
        type: string
      golangci_lint_version:
        description: golangci-lint version installed before quality gates.
        required: false
        type: string
        default: v2.12.2
      go_version_file:
        description: >-
          Path to the consumer's go.mod file. Defaults to the repository root
          module.
        required: false
        type: string
        default: go.mod
      runs_on:
        description: Runner label for Go jobs.
        required: false
        type: string
        default: ubuntu-latest
      timeout_minutes:
        description: Timeout in minutes for each Go job.
        required: false
        type: number
        default: 360
      working_directory:
        description: Directory where make targets run.
        required: false
        type: string
        default: .
      pre_make_commands:
        description: >-
          Optional shell commands to run before make, for consumers with
          unavoidable system setup that cannot be expressed as apt packages or
          Go tools.
        required: false
        type: string
      skip_unchanged:
        description: >-
          When true (default), skip the quality and build work on a push that
          changes nothing the Go build or tests depend on. The matrix and build
          jobs still run and report their named checks, so required status checks
          stay green; only the gate steps inside them are skipped. Set false to
          always run the gates.
        required: false
        type: boolean
        default: true
    outputs:
      changed:
        description: >-
          Whether the push changed anything the Go build or tests depend on, as
          computed by go-mk ci-changed. A consumer can gate its own extra Go job
          with `needs: <this job>` and `if: needs.<job>.outputs.changed == 'true'`.
        value: ${{ jobs.changes.outputs.changed }}

jobs:
  changes:
    name: Changes
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
      changed: ${{ steps.detect.outputs.changed }}
      release_configured: ${{ steps.release-detect.outputs.configured }}
    steps:
      # fetch-depth 0 so the detector can diff against github.event.before on the
      # default branch and compute merge-base against origin/<default> on feature
      # branches.
      - uses: actions/checkout@v7
        with:
          submodules: false
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache-dependency-path: |
            ${{ inputs.go_version_file }}
            ${{ inputs.working_directory }}/go.sum
            ${{ inputs.working_directory }}/go.work
            ${{ inputs.working_directory }}/go.work.sum
      # make ci-changed runs only the cheap detector path. The engine uses
      # `go list -e` plus declared trigger dirs, writes changed=<bool> to
      # GITHUB_OUTPUT, and any uncertainty fails safe to changed=true.
      - name: Detect Go-relevant changes
        id: detect
        working-directory: ${{ inputs.working_directory }}
        env:
          GO_MK_DIFF_BASE: ${{ github.event.before }}
          GO_MK_DIFF_HEAD: ${{ github.sha }}
          GO_MK_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GO_MK_EVENT_NAME: ${{ github.event_name }}
          GO_MK_REF_NAME: ${{ github.ref_name }}
        run: |
          if ! make ci-changed; then
            echo "ci-changed detector failed; running all gates (fail-safe)" >&2
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi
      - name: Decide whether gates run
        id: decide
        env:
          CHANGED: ${{ steps.detect.outputs.changed }}
          SKIP_UNCHANGED: ${{ inputs.skip_unchanged }}
        run: |
          # Only skip when the detector explicitly said changed=false. An empty
          # value (the detector or its GITHUB_OUTPUT write failed) fails safe to
          # running every gate.
          if [ "${SKIP_UNCHANGED}" != "true" ] || [ "${CHANGED}" != "false" ]; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi
      # A consumer opts into a release by including go-release.mk, which defines
      # the bodyless go-mk-release-configured target. `make -n` reports whether
      # the target exists without running it: exit 0 when present, nonzero "No
      # rule to make target" when absent. This is how release-smoke decides
      # whether to run without any consumer-facing input.
      - name: Detect release configuration
        id: release-detect
        working-directory: ${{ inputs.working_directory }}
        run: |
          if make -n go-mk-release-configured >/dev/null 2>&1; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    name: Quality / ${{ matrix.name }}
    # The job always runs so the matrix expands and every named check (Quality /
    # Vet, and so on) reports, which required status checks depend on. When the
    # detector says nothing relevant changed, every step below is skipped and the
    # job still succeeds, so the required check stays green without doing the work.
    needs: changes
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Vet
            command: make vet
            install_golangci_lint: false
          - name: Test
            command: make test
            install_golangci_lint: false
          - name: Golangci Lint
            command: make lint-golangci
            install_golangci_lint: true
          - name: Format
            command: make lint-format
            install_golangci_lint: true
          - name: Gocyclo
            command: make lint-gocyclo
            install_golangci_lint: false
          - name: Deadcode
            command: make lint-deadcode
            install_golangci_lint: false
          - name: Staticcheck Extra
            command: make staticcheck-extra
            install_golangci_lint: false
          - name: Govulncheck
            command: make govulncheck
            install_golangci_lint: false
          - name: Go Version
            command: make go-version-check
            install_golangci_lint: false
    steps:
      - if: needs.changes.outputs.run == 'true'
        uses: actions/checkout@v7
        with:
          submodules: ${{ inputs.submodules }}
      - name: Install apt packages
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - if: needs.changes.outputs.run == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache-dependency-path: |
            ${{ inputs.go_version_file }}
            ${{ inputs.working_directory }}/go.sum
            ${{ inputs.working_directory }}/go.work
            ${{ inputs.working_directory }}/go.work.sum
      - name: Install ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
      - name: Restore ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.working_directory }}-${{ hashFiles(inputs.go_version_file, format('{0}/go.sum', inputs.working_directory), format('{0}/go.work', inputs.working_directory), format('{0}/go.work.sum', inputs.working_directory)) }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.working_directory }}-
      - name: Configure ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            echo "CC=ccache gcc"
            echo "CXX=ccache g++"
          } >> "${GITHUB_ENV}"
      - name: Inspect go-mk cache manifest
        id: go-mk-cache-prep
        if: needs.changes.outputs.run == 'true'
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Prepare generated submodules
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache-prep.outputs.generated_cache_requires_submodules == 'true'
        run: make go-mk-prepare-submodules
        working-directory: ${{ inputs.working_directory }}
      - name: Build go-mk cache manifest
        id: go-mk-cache
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache-prep.outputs.generated_cache_enabled == 'true'
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Restore generated outputs
        id: generated-cache-restore
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache.outputs.generated_cache_enabled == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Install Go tool packages
        if: needs.changes.outputs.run == 'true' && inputs.go_tool_packages != ''
        run: |
          for go_tool_package in ${{ inputs.go_tool_packages }}; do
            go install "${go_tool_package}"
          done
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Run pre-make commands
        if: needs.changes.outputs.run == 'true' && inputs.pre_make_commands != ''
        run: ${{ inputs.pre_make_commands }}
      - name: Install golangci-lint
        if: needs.changes.outputs.run == 'true' && matrix.install_golangci_lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci_lint_version }}
          install-only: true
      - if: needs.changes.outputs.run == 'true'
        run: ${{ matrix.command }}
        working-directory: ${{ inputs.working_directory }}
      - name: Show ccache stats
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: ccache --show-stats || true

  build:
    name: Build
    # Same pattern as quality: the job always runs so the Build check reports;
    # its steps are skipped when nothing relevant changed.
    needs: changes
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
      id-token: write
    steps:
      - if: needs.changes.outputs.run == 'true'
        uses: actions/checkout@v7
        with:
          submodules: ${{ inputs.submodules }}
      - name: Install apt packages
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - if: needs.changes.outputs.run == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache-dependency-path: |
            ${{ inputs.go_version_file }}
            ${{ inputs.working_directory }}/go.sum
            ${{ inputs.working_directory }}/go.work
            ${{ inputs.working_directory }}/go.work.sum
      - name: Install ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
      - name: Restore ccache
        id: ccache-restore
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.working_directory }}-${{ hashFiles(inputs.go_version_file, format('{0}/go.sum', inputs.working_directory), format('{0}/go.work', inputs.working_directory), format('{0}/go.work.sum', inputs.working_directory)) }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.working_directory }}-
      - name: Configure ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: |
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            echo "CC=ccache gcc"
            echo "CXX=ccache g++"
          } >> "${GITHUB_ENV}"
      - name: Inspect go-mk cache manifest
        id: go-mk-cache-prep
        if: needs.changes.outputs.run == 'true'
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Prepare generated submodules
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache-prep.outputs.generated_cache_requires_submodules == 'true'
        run: make go-mk-prepare-submodules
        working-directory: ${{ inputs.working_directory }}
      - name: Build go-mk cache manifest
        id: go-mk-cache
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache-prep.outputs.generated_cache_enabled == 'true'
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Restore generated outputs
        id: generated-cache-restore
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache.outputs.generated_cache_enabled == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Install Go tool packages
        if: needs.changes.outputs.run == 'true' && inputs.go_tool_packages != ''
        run: |
          for go_tool_package in ${{ inputs.go_tool_packages }}; do
            go install "${go_tool_package}"
          done
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
      - name: Run pre-make commands
        if: needs.changes.outputs.run == 'true' && inputs.pre_make_commands != ''
        run: ${{ inputs.pre_make_commands }}
      - if: needs.changes.outputs.run == 'true'
        run: make build
        working-directory: ${{ inputs.working_directory }}
      - name: Show ccache stats
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != ''
        run: ccache --show-stats || true
      - name: Save generated outputs
        if: needs.changes.outputs.run == 'true' && steps.go-mk-cache.outputs.generated_cache_enabled == 'true' && steps.generated-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Save ccache
        if: needs.changes.outputs.run == 'true' && runner.os == 'Linux' && inputs.apt_packages != '' && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.working_directory }}-${{ hashFiles(inputs.go_version_file, format('{0}/go.sum', inputs.working_directory), format('{0}/go.work', inputs.working_directory), format('{0}/go.work.sum', inputs.working_directory)) }}

  release-smoke:
    name: Release Smoke / ${{ matrix.goos }}/${{ matrix.goarch }}
    # Automatic, not opt-in: every consumer gets this job, but it only runs the
    # real build when go-mk-release-configured exists (the consumer includes
    # go-release.mk) and something relevant changed; a repo with no release
    # configured gets one cheap skipped check with no runner or container cost,
    # because the job-level `if:` below prevents the matrix from expanding at
    # all. It reuses the exact same `make release` (RELEASE_STAGE=build) build
    # path a real release runs, across the same four release platforms, so a
    # green run here proves the release build itself would succeed. It never
    # signs, tags, or publishes; no Apple secrets are read, so a fork or PR run
    # exercises the darwin cross-compile, cgo dependency, and generated-cache
    # paths without needing any credentials.
    needs: changes
    if: needs.changes.outputs.run == 'true' && needs.changes.outputs.release_configured == 'true'
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # Mirrors _release.yml's build matrix exactly, including the goreleaser-cross
      # image tag, so the smoke exercises the same darwin cross toolchain a real
      # release uses.
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: ubuntu-24.04
            container: "ghcr.io/goreleaser/goreleaser-cross:v1.26.3"
            cc: o64-clang
            cxx: o64-clang++
          - goos: darwin
            goarch: arm64
            runner: ubuntu-24.04
            container: "ghcr.io/goreleaser/goreleaser-cross:v1.26.3"
            cc: oa64-clang
            cxx: oa64-clang++
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: ${{ inputs.submodules }}
      # Inside the darwin cross container the job runs as root while the
      # checkout is owned by the runner user; see _release.yml for the same fix.
      - name: Trust workspace for git in container
        if: matrix.container != ''
        run: git config --global --add safe.directory '*'
      - name: Install apt packages
        if: matrix.goos == 'linux' && inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - name: Install ccache on Linux
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache-dependency-path: |
            ${{ inputs.go_version_file }}
            ${{ inputs.working_directory }}/go.sum
            ${{ inputs.working_directory }}/go.work
            ${{ inputs.working_directory }}/go.work.sum
      - name: Restore ccache
        id: ccache-restore
        if: matrix.goos == 'linux'
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles(inputs.go_version_file, format('{0}/go.sum', inputs.working_directory), format('{0}/go.work', inputs.working_directory), format('{0}/go.work.sum', inputs.working_directory)) }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-
      - name: Configure ccache
        if: matrix.goos == 'linux'
        run: |
          {
            echo "CCACHE_DIR=${HOME}/.ccache"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_NOHASHDIR=true"
            echo "CC=ccache gcc"
            echo "CXX=ccache g++"
          } >> "${GITHUB_ENV}"
      - name: Configure darwin cross compilers
        if: matrix.goos == 'darwin'
        # Dedicated GO_MK_CC/GO_MK_CXX, not global CC/CXX, so go-mk applies the
        # cross compiler only to the target build and its cgo-dep provisioning;
        # see _release.yml for the incident this avoids (a leaked global CC
        # miscompiling the go-mk binary itself inside the container).
        run: |
          {
            echo "GO_MK_CC=${{ matrix.cc }}"
            echo "GO_MK_CXX=${{ matrix.cxx }}"
          } >> "${GITHUB_ENV}"
      - name: Inspect go-mk cache manifest
        id: go-mk-cache-prep
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Prepare generated submodules
        if: steps.go-mk-cache-prep.outputs.generated_cache_requires_submodules == 'true'
        run: make go-mk-prepare-submodules
        working-directory: ${{ inputs.working_directory }}
      - name: Build go-mk cache manifest
        id: go-mk-cache
        if: steps.go-mk-cache-prep.outputs.generated_cache_enabled == 'true'
        run: make go-mk-cache-manifest
        working-directory: ${{ inputs.working_directory }}
      - name: Restore generated outputs
        id: generated-cache-restore
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true'
        uses: actions/cache/restore@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      # No RELEASE_TAG, QUILL_*, or REQUIRE_DARWIN_CODESIGN: stage=build never
      # tags or publishes, and signDarwinBinaries skips cleanly with no quill
      # install needed when QUILL_SIGN_P12 is unset. CGO_ENABLED is always "1"
      # so a cgo consumer's darwin cross-compile and GO_MK_CGO_DEPS provisioning
      # are exercised; a pure-Go consumer has no cgo files, so this is a no-op
      # for it.
      - name: Build (release smoke)
        env:
          RELEASE_STAGE: build
          RELEASE_PLATFORMS: ${{ matrix.goos }}/${{ matrix.goarch }}
          CGO_ENABLED: "1"
          DIST_DIR: ${{ runner.temp }}/go-mk-release-smoke
        run: make release
        working-directory: ${{ inputs.working_directory }}
      - name: Show ccache stats
        if: matrix.goos == 'linux'
        run: ccache --show-stats || true
      - name: Save generated outputs
        if: steps.go-mk-cache.outputs.generated_cache_enabled == 'true' && steps.generated-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ steps.go-mk-cache.outputs.generated_cache_paths }}
          key: go-mk-generated-${{ runner.os }}-${{ runner.arch }}-${{ github.repository_id }}-${{ steps.go-mk-cache.outputs.generated_cache_key }}
      - name: Save ccache
        if: matrix.goos == 'linux' && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles(inputs.go_version_file, format('{0}/go.sum', inputs.working_directory), format('{0}/go.work', inputs.working_directory), format('{0}/go.work.sum', inputs.working_directory)) }}
