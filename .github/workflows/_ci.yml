name: CI

on:
  workflow_call:
    inputs:
      submodules:
        description: >-
          Submodule checkout mode passed straight to actions/checkout
          (false, true, or recursive). Defaults to false so consumers
          without submodules are unaffected.
        required: false
        type: string
        default: "false"
      apt_packages:
        description: >-
          Space-separated apt packages to install before the Go steps, for
          consumers that need system libraries (for example a CGO dependency
          such as libpcre2-dev). A consumer with no system dependencies omits
          this input and the install step does not run.
        required: false
        type: string

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}
      - name: Install apt packages
        if: inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true
      - run: make build-check

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}
      - name: Install apt packages
        if: inputs.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_packages }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build
      - run: make test
