version: "2"

run:
  timeout: 3m

linters:
  default: all
  disable:
    - depguard            # we use staticcheck-extra for ban-lists
    - dupl                # noisy on legitimate similar shapes
    - embeddedstructfieldcheck  # cosmetic: blank line after embedded fields
    - err113              # we use fmt.Errorf %w consistently
    - errcheck            # superseded by wrapcheck
    - forbidigo           # superseded by staticcheck-extra banned_direct_output (which honors package main)
    - funcorder           # cosmetic: method/constructor ordering
    - gochecknoglobals    # var blocks are fine
    - gochecknoinits      # init() is fine for once.Do registration
    - goconst             # noisy on enum-like literals
    - godot               # overlaps godoclint (comment ending periods)
    - godox               # TODO/FIXME comments are fine in dev
    - inamedparam         # cosmetic: interface method param naming
    - ireturn             # adapter layers do return interfaces intentionally
    - lll                 # godoclint covers comment width
    - mnd                 # magic numbers fire too often
    - nilnil              # we use (T, error) = (nil, nil) intentionally
    - nlreturn            # cosmetic
    - noinlineerr         # style preference; if err := ... is idiomatic Go, no defect surfaced
    - nonamedreturns      # named returns used in some patterns
    - paralleltest        # not all tests can be parallel
    - prealloc            # micro-perf; pre-allocate slice rarely material in non-hot paths
    - tagalign            # cosmetic: struct tag whitespace alignment
    - tagliatelle         # JSON casing not enforced
    - varnamelen          # short names in tight scopes are fine
    - wsl                 # cosmetic whitespace
    - wsl_v5              # ditto
  settings:
    cyclop:
      max-complexity: 50

    funlen:
      lines: 100
      statements: 60

    gocognit:
      min-complexity: 50

    godoclint:
      default: all

    perfsprint:
      # Disable the fmt.Errorf("plain") -> errors.New nudge: it is real but
      # mechanical and the volume drowns out higher-signal findings. The other
      # checks stay on, including sprintf1 which catches actual bugs like
      # fmt.Sprintf("%s", x) for non-string x.
      errorf: false

    nolintlint:
      require-specific: true
      require-explanation: true
      allow-no-explanation: []

    gocritic:
      disabled-checks:
        - singleCaseSwitch
      enabled-checks:
        - boolExprSimplify
        - nilValReturn

    revive:
      rules:
        - name: exported              # every exported symbol has godoc
        - name: package-comments      # every package has a doc comment
        - name: unused-parameter
        - name: unused-receiver
        - name: empty-block
        - name: indent-error-flow
        - name: var-naming
        - name: comment-spacings

    exhaustive:
      default-signifies-exhaustive: false  # require explicit cases

    exhaustruct:
      include:
        - 'goodkind\.io/.*/internal/.*'

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(

  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - _test\.go
      - vendor
      - gen
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - gen
      - third_party$
      - builtin$
      - examples$

output:
  sort-order:
    - file
