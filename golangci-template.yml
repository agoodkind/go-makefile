version: "2"

run:
  timeout: 3m

linters:
  default: all
  disable:
    - cyclop
    - depguard
    - dupl
    - err113
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - godoclint
    - godot
    - godox
    - ireturn
    - lll
    - mnd
    - nilnil
    - nlreturn
    - nolintlint
    - nonamedreturns
    - paralleltest
    - revive
    - tagliatelle
    - unused
    - varnamelen
    - wsl
    - wsl_v5
  settings:
    gocritic:
      disabled-checks:
        - singleCaseSwitch
      enabled-checks:
        - boolExprSimplify
        - nilValReturn
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
    paths:
      - vendor
      - gen
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - gen
      - third_party$
      - builtin$
      - examples$

output:
  sort-order:
    - file
